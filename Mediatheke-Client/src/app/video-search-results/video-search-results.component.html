<div class="result-wrap" *ngIf="searchService.suggestions$ | async as suggestions">
    <div class="suggestions">
        <p class="suggestions-empty" *ngIf="suggestions.length === 0 && !searchService.isSearching">
            Keine Ergebnisse
        </p>
        <app-video-small-list [videos]="suggestions"></app-video-small-list>
    </div>
</div>
