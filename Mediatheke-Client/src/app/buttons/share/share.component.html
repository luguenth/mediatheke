<button type="button"
    [class.command-button]="variant === 'full'"
    [class.media-button]="variant === 'icon'"
    [class.media-button--subtle]="variant === 'icon'"
    [class.media-button--icon]="variant === 'icon'"
    [class.vjs-share-button]="variant === 'icon'"
    [popover]="shareComponent" [popoverTitle]="'Teile dieses Video'"
    [outsideClick]="true" [placement]="variant === 'icon' ? 'top' : 'bottom'"
    (click)="generateShareLink()">
    <i-bs *ngIf="variant === 'full'" name="share" width="24" height="24"></i-bs>
    <svg *ngIf="variant === 'icon'" class="media-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" viewBox="0 0 18 18"><circle cx="13.5" cy="4.5" r="2"/><circle cx="4.5" cy="9" r="2"/><circle cx="13.5" cy="13.5" r="2"/><path d="M6.2 8 11.8 5.5M6.2 10 11.8 12.5"/></svg>
    <ng-container *ngIf="variant === 'full'"> Teilen</ng-container>
</button>

<ng-template #shareComponent>
    <div class="share-popover">
        <label class="share-popover__ts">
            <input type="checkbox" [(ngModel)]="includeTimestamp" (change)="toggleTimestamp()">
            <span>Mit Zeitstempel</span>
        </label>
        <input class="share-popover__link" type="text" readonly [value]="shareLink">
        <button
            class="share-popover__copy"
            (click)="copyToClipboard()"
            [class.share-popover__copy--done]="copied">
            {{ copied ? 'Kopiert!' : 'In die Zwischenablage' }}
        </button>
    </div>
</ng-template>
