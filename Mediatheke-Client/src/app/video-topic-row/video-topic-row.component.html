<!-- community-recommendation.component.html -->
<div class="recommendation-container">
    <div class="background">
        <span class="heading"> {{ title }} </span>
        <div class="boxes"></div>
            <!-- leading phantom spacer: scrolled out on init, fades into the left edge as the user scrolls right -->
            <div class="scroll-spacer scroll-spacer--leading" aria-hidden="true"></div>

            <div class="box" *ngFor="let video of videos">
                <app-video-card [video]="video"></app-video-card>
            </div>

            <button type="button"
                class="load-more"
                *ngIf="hasMore && !loading"
                (click)="loadMore()">
                <span class="load-more-label">Mehr Videos laden</span>
                <span class="load-more-hint">scrolle nach rechts</span>
            </button>

            <div class="loading" *ngIf="loading">
                <span class="spinner" aria-hidden="true"></span>
                <span class="loading-label">lade …</span>
            </div>

            <!-- trailing phantom spacer so the last real card sits clear of the right-side mask fade -->
            <div class="scroll-spacer scroll-spacer--trailing" aria-hidden="true"></div>
        </div>
    </div>
</div>
